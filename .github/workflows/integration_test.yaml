name: Integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_call:

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@fix_integration_test
    secrets: inherit
    with:
      runs-on: "self-hosted-linux-amd64-noble-xlarge"
      channel: 1.34-strict/stable
      modules: >-
        ["test_charm.py",
        "test_policy.py",
        "test_resources.py",
        "test_scaling.py",
        "test_upgrades.py",
        "test_catalog_updates.py",
        "test_managers.py",
        "test_trino_catalog_relation.py",
        "test_pg_catalog_relation.py"]
      juju-channel: 3/stable
      microk8s-addons: "dns ingress rbac storage metallb:10.15.119.2-10.15.119.4 registry"
      trivy-severity-config: CRITICAL
