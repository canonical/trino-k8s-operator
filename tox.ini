[tox]
no_package = True
skip_missing_interpreters = True
env_list = format, lint, static, unit, coverage-report
min_version = 4.0.0

[vars]
src_path = {tox_root}/src
tests_path = {tox_root}/tests
all_path = {[vars]src_path} {[vars]tests_path}

[testenv]
runner = uv-venv-runner
set_env =
    PYTHONPATH = {tox_root}/lib:{[vars]src_path}
    PYTHONBREAKPOINT=pdb.set_trace
    PY_COLORS=1
    charm: TEST_FILE=test_charm.py
    catalog: TEST_FILE=test_catalog_updates.py
    policy: TEST_FILE=test_policy.py
    managers: TEST_FILE=test_managers.py
    scaling: TEST_FILE=test_scaling.py
    upgrades: TEST_FILE=test_upgrades.py
    resources: TEST_FILE=test_resources.py
    catalog-relation: TEST_FILE=test_trino_catalog_relation.py
    pg-catalog-relation: TEST_FILE=test_pg_catalog_relation.py
pass_env =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS

[testenv:format]
description = Apply coding style standards to code
dependency_groups = lint
commands =
    ruff format {[vars]all_path}
    ruff check --fix {[vars]all_path}

[testenv:lint]
description = Check code against coding style standards
dependency_groups = lint
commands =
    codespell {tox_root} --skip {tox_root}/.git --skip {tox_root}/.tox \
      --skip {tox_root}/build --skip {tox_root}/lib --skip {tox_root}/venv \
      --skip {tox_root}/.mypy_cache --skip {tox_root}/icon.svg \
      --skip {tox_root}/.ruff_cache --ignore-words-list "ro"
    ruff check {[vars]all_path}
    ruff format --check --diff {[vars]all_path}

[testenv:static]
description = Run static type checks and security analysis
deps =
    -r pyproject.toml
dependency_groups =
    lint
    static
commands =
    # TODO (mertalpt): pyright is new but stricter than bandit
    # and there is planned tasks for a proper refactor later.
    # Enable it after the refactor.
    # pyright {posargs}
    bandit -c {tox_root}/pyproject.toml -r {[vars]src_path} {[vars]tests_path}

[testenv:unit]
description = Run unit tests
deps =
    -r pyproject.toml
dependency_groups = unit
commands =
    coverage run --source={[vars]src_path} \
                 -m pytest \
                 --tb native \
                 -vv \
                 -s \
                 {posargs} \
                 {[vars]tests_path}/unit
    coverage report

# `operator-workflows/test.yaml` expects this target.
[testenv:coverage-report]
description = Create test coverage report
depends = unit
deps =
    -r pyproject.toml
dependency_groups = unit
commands =
    coverage report

[testenv:integration]
description = Run integration tests
runner = uv-venv-lock-runner
pass_env =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS
dependency_groups = integration
commands =
    pytest {[vars]tests_path}/integration -v --tb native --ignore={[vars]tests_path}/unit --log-cli-level=INFO -s {posargs}

[testenv:integration-{charm,policy,managers,upgrades,scaling,resources,catalog-relation,pg-catalog-relation}]
description = Run integration tests
runner = uv-venv-lock-runner
pass_env =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS
dependency_groups = integration
commands =
    pytest {[vars]tests_path}/integration/{env:TEST_FILE} -v --tb native --ignore={[vars]tests_path}/unit --log-cli-level=INFO -s {posargs}
